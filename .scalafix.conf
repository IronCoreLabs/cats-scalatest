// Syntactic lint rules that replace the code-smell checks previously enforced
// by scalastyle. Formatting/whitespace/line-length is handled by scalafmt
// (.scalafmt.conf); these rules cover the banned-construct checks. All rules
// here are syntactic, so `scalafix --check` runs on Scala 3 without SemanticDB.
rules = [
  DisableSyntax
]

DisableSyntax.noNulls = true
DisableSyntax.noReturns = true
DisableSyntax.noFinalize = true
DisableSyntax.noTabs = true
DisableSyntax.regex = [
  {
    id = "noPrintln"
    pattern = "\\bprintln\\b"
    message = "Do not use println; return a value or use a logger."
  }
  {
    id = "noUnimplemented"
    pattern = "\\?\\?\\?"
    message = "Do not commit ??? (unimplemented)."
  }
]
